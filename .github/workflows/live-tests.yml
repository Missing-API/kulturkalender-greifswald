name: Live E2E Tests

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday at 06:00 UTC
  workflow_dispatch: # On-demand trigger

jobs:
  live-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:e2e:live

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-test-reports
          path: reports/
          retention-days: 14
